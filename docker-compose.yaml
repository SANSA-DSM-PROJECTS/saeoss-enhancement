services:
  nginx:
    image: nginx:latest
    container_name: nginx-dev
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/404.html:/usr/share/nginx/html/404.html:ro
      - ./laravel:/var/www/laravel
      - /var/www/laravel/vendor 
      - nginx_logs:/var/log/nginx
      - ./logs/nginx:/var/log/nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${NGINX_CPU_LIMIT}'
          memory: ${NGINX_MEMORY_LIMIT}
    logging:
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
    depends_on:
      - geoserver
      - laravel

  geoserver:
    image: kartoza/geoserver:latest
    container_name: geoserver
    ports:
      - "${GEOSERVER_PORT}:8080"
    deploy: 
      resources:
        limits:
          cpus: '${GEOSERVER_CPU_LIMIT}'
          memory: ${GEOSERVER_MEMORY_LIMIT}
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ${GEOSERVER_DATA_PATH}:/data
      - ./geoserver/cache:/opt/geoserver/data_dir/gwc
    environment:
      - GEOSERVER_ADMIN_USER=${GEOSERVER_ADMIN_USER}
      - GEOSERVER_ADMIN_PASSWORD=${GEOSERVER_ADMIN_PASSWORD}
      - JAVA_OPTS=${GEOSERVER_JAVA_OPTS}
      - GEOSERVER_JAVA_OPTS=${GEOSERVER_EXTRA_JAVA_OPTS}
      - PRODUCTION=${GEOSERVER_PRODUCTION}
      - ENABLE_JSONP=${GEOSERVER_ENABLE_JSONP}
      - HTTP_PORT=8080
      - HTTP_HOST=0.0.0.0
      - HTTP_HOST=10.150.16.88
      - PROXY_BASE_URL=${GEOSERVER_PROXY_BASE_URL}
      - GEOSERVER_CSRF_WHITELIST=${GEOSERVER_CSRF_WHITELIST}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/geoserver || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  postgres:
    image: postgis/postgis:15-3.3
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_HOST_AUTH_METHOD=${POSTGRES_HOST_AUTH_METHOD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c shared_buffers=${POSTGRES_SHARED_BUFFERS}
               -c effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE}
               -c work_mem=${POSTGRES_WORK_MEM}

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPU_LIMIT}'
          memory: ${REDIS_MEMORY_LIMIT}
    command: redis-server --save "" --appendonly no --maxmemory ${REDIS_MAX_MEMORY} --maxmemory-policy ${REDIS_MAXMEMORY_POLICY}

  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: '${LARAVEL_CPU_LIMIT}'
          memory: ${LARAVEL_MEMORY_LIMIT}
    volumes:
      - ./laravel:/var/www/laravel
      - /var/www/laravel/vendor       
      - /var/www/laravel/bootstrap/cache
      - ./logs/nginx:/var/log/nginx:ro
    working_dir: /var/www/laravel
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    
    labels:
      - "com.docker.compose.service=laravel"
      - "com.docker.compose.container-number=${COMPOSE_REPLICA}"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPcache.enable=${OPCACHE_ENABLE}
      - OPcache.memory_consumption=${OPCACHE_MEMORY_CONSUMPTION}
      - OPcache.max_accelerated_files=${OPCACHE_MAX_FILES}
      - OPcache.revalidate_freq=${OPCACHE_REVALIDATE_FREQ}
    command: >
      bash -c "php artisan config:cache
      && php artisan route:cache
      && php artisan view:cache
      && php artisan migrate --force
      && php-fpm"

volumes:
  geoserver_data:
  postgres_data:
  nginx_logs:
