worker_processes auto;
worker_rlimit_nofile 100000;

events {
    worker_connections 4000;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 400M;

    log_format error_notify '$time_iso8601|$server_name|$remote_addr|'
                           '$request_method|$request_uri|$status|'
                           '$upstream_addr|$upstream_status|$request_time|'
                           '$http_referer|$http_user_agent';
    
    map $request_time $slow_request {
        default 0;
        "~^[5-9]\." 1;
        "~^[0-9]{2,}" 1;
    }
    
    map $status $log_error_notify {
        404 1;
        502 1;
        503 1;
        504 1;
        default 0;
    }
    
    upstream geoserver_backend {
        ip_hash;
        server geoserver:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name example.sansa.org.za;
        return 301 https://$host$request_uri;
        access_log /var/log/nginx/error_notify.log error_notify if=$log_error_notify;
    }

    server {
        listen 443 ssl;
        server_name example.sansa.org.za;

        ssl_certificate /etc/nginx/certs/sansa-public.crt;
        ssl_certificate_key /etc/nginx/certs/sansa-private.key;

        access_log /var/log/nginx/access.log combined;
        access_log /var/log/nginx/error_notify.log error_notify if=$log_error_notify;

        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        location / {
            root /var/www/laravel/public;
            index index.php index.html index.htm;
            try_files $uri $uri/ /index.php?$query_string;
            access_log /var/log/nginx/slow_requests.log error_notify if=$slow_request;
        }

        location ~ \.php$ {
            root /var/www/laravel/public;
            fastcgi_pass laravel:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 300;
            fastcgi_connect_timeout 75;
            fastcgi_keep_conn on;
            log_subrequest on;
        }

        location /geoserver/ {
            proxy_pass http://geoserver_backend/geoserver/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host; 
            proxy_set_header X-Forwarded-Port 443; 
            
            proxy_redirect http://example.sansa.org.za/ https://example.sansa.org.za/;
            proxy_redirect http://geoserver:8080/ https://example.sansa.org.za/;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            
            proxy_read_timeout 300;
            proxy_connect_timeout 75;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }
        
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }
    }
}
